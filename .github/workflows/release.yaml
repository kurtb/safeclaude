name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -race

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test release binary
        run: |
          # Verify the linux/amd64 binary runs and reports the correct version
          tar -xzf dist/safeclaude_*_linux_amd64.tar.gz -C /tmp
          version=$(/tmp/safeclaude version 2>&1 || true)
          expected="${GITHUB_REF_NAME#v}"
          echo "Binary reports: $version"
          echo "Expected version: $expected"
          if ! echo "$version" | grep -q "$expected"; then
            echo "FAIL: version mismatch"
            exit 1
          fi
          echo "Smoke test passed"
